services:
  jay:
    build: .
    container_name: birdple_jay
    networks:
      - dokploy-network
    volumes:
      - jay_data:/data
    environment:
      JAY_DATA_DIR: /data
      JAY_LISTEN_ADDR: ":9000"
      JAY_ADMIN_ADDR: ":9001"
      JAY_NATIVE_ADDR: ":4444"
      JAY_LOG_LEVEL: info
      JAY_ADMIN_TOKEN: ${JAY_ADMIN_TOKEN}
      JAY_SIGNING_SECRET: ${JAY_SIGNING_SECRET}
      JAY_SEED_TOKEN_ACCOUNT: ${JAY_SEED_TOKEN_ACCOUNT}
      JAY_SEED_TOKEN_ID: ${JAY_SEED_TOKEN_ID}
      JAY_SEED_TOKEN_SECRET: ${JAY_SEED_TOKEN_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4011/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  dokploy-network:
    external: true
    name: dokploy-network

volumes:
  jay_data:
